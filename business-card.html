<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0d1822;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  font-family:'Segoe UI', Arial, sans-serif;
  padding:20px;
}
.card {
  width:100%;
  max-width:360px;
  background:#0d1822;
  border-radius:18px;
  overflow:hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  text-align:center;
  padding:30px 20px 28px;
  border:1px solid rgba(255,255,255,0.06);
}
.logo-row {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-bottom:22px;
}
.logo-row img { width:34px; height:34px; object-fit:contain; }
.company-name {
  color:#ffffff;
  font-size:20px;
  font-weight:800;
  letter-spacing:0.1em;
}
.photo-circle {
  width:110px;
  height:110px;
  border-radius:50%;
  overflow:hidden;
  margin:0 auto 18px;
  border:3px solid #F07535;
  box-shadow: 0 0 0 5px rgba(240,117,53,0.15);
}
.photo-circle img {
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center 10%;
}
.name-he {
  color:#c8d8e8;
  font-size:17px;
  font-weight:600;
  letter-spacing:0.02em;
  margin-bottom:5px;
}
.job-title {
  color:#F07535;
  font-size:13px;
  font-weight:700;
  letter-spacing:0.07em;
  margin-bottom:24px;
}
.divider {
  height:1px;
  background:rgba(255,255,255,0.1);
  margin:0 0 20px;
}
.contact-list {
  display:flex;
  flex-direction:column;
  gap:11px;
  margin-bottom:22px;
}
.contact-item {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  color:#e2edf7;
  font-size:13.5px;
  font-weight:600;
  text-decoration:none;
  direction:ltr;
}
.contact-item svg {
  width:14px; height:14px;
  fill:none;
  stroke:#4F88B0;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
  flex-shrink:0;
}
.btn-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:12px;
}
.btn {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:7px;
  padding:14px 10px;
  border-radius:10px;
  text-decoration:none;
  font-size:12.5px;
  font-weight:600;
  letter-spacing:0.04em;
  cursor:pointer;
  border:1px solid rgba(255,255,255,0.13);
  background:transparent;
  color:#e2edf7;
  transition:border-color 0.15s;
}
.btn:hover { border-color:rgba(255,255,255,0.28); }
.btn svg {
  width:18px; height:18px;
  fill:none;
  stroke:#e2edf7;
  stroke-width:1.8;
  stroke-linecap:round;
  stroke-linejoin:round;
}
.btn-save {
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:15px;
  background:#F07535;
  color:#fff;
  border-radius:10px;
  font-size:14px;
  font-weight:800;
  text-decoration:none;
  letter-spacing:0.04em;
  border:none;
  cursor:pointer;
}
.btn-save svg {
  width:17px; height:17px;
  fill:none;
  stroke:#fff;
  stroke-width:2.2;
  stroke-linecap:round;
  stroke-linejoin:round;
}
.tagline {
  margin-top:20px;
  padding-top:16px;
  border-top:1px solid rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.38);
  font-size:11px;
  font-weight:500;
  line-height:1.9;
  font-style:italic;
}
.qr-section {
  margin-top:22px;
  padding-top:18px;
  border-top:1px solid rgba(255,255,255,0.08);
}
.qr-label {
  color:rgba(255,255,255,0.35);
  font-size:10px;
  letter-spacing:0.1em;
  margin-bottom:10px;
}
#qrcode {
  display:flex;
  justify-content:center;
}
#qrcode canvas, #qrcode img {
  border-radius:8px;
  padding:8px;
  background:#fff;
}
</style>
